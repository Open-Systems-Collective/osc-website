site_name: Open Systems Collective
site_url: https://open-systems-collective.github.io
site_description: An independent, open research community exploring intelligent, ethical, and adaptive systems.
repo_url: https://github.com/Open-Systems-Collective/open-systems-collective.github.io
repo_name: Open-Systems-Collective

theme:
  name: material
  palette:
    - scheme: default
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue grey
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - toc.follow
    - search.suggest
    - search.highlight

nav:
  - Home: index.md
  - About: about.md
  - Open Knowledge Blocks:
    - Overview: okb/overview.md
    - Getting Started: okb/getting-started.md
    - "Block: kb_human_oversight": okb/kb-human-oversight.md
    - "Block: kb_clinical_safety": okb/kb-clinical-safety.md
  - Community: community.md
  - Research: research.md
  - AI Disclosure: ai-disclosure.md

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/Open-Systems-Collective

copyright: Copyright 2025, Open Systems Collective. Released under the MIT License.
